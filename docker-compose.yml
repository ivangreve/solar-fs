services:
  db:
    image: postgres:16-alpine
    container_name: solarfs-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: solarfs
      POSTGRES_PASSWORD: solarfs
      POSTGRES_DB: solarfs
    ports:
      # 5433 en el host para no chocar con un Postgres local en 5432
      - "5433:5432"
    volumes:
      - solarfs_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U solarfs -d solarfs"]
      interval: 5s
      timeout: 5s
      retries: 10

  nginx:
    image: nginx:alpine
    container_name: solarfs-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx/dev.conf:/etc/nginx/conf.d/default.conf:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # Ingesta periódica en dev: un curl chiquito que pega al endpoint /api/cron/ingest
  # del `next dev` (en el host:3009) cada INGEST_INTERVAL segundos. Reusa toda la env
  # del server (DATABASE_URL, credenciales Felicity) — acá solo viaja el CRON_SECRET.
  # Requiere que el `next dev` corra con el mismo CRON_SECRET exportado en tu shell.
  ingest:
    image: curlimages/curl:latest
    container_name: solarfs-ingest
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      CRON_SECRET: ${CRON_SECRET:-}
      INGEST_URL: ${INGEST_URL:-http://host.docker.internal:3009/api/cron/ingest}
      INGEST_INTERVAL: ${INGEST_INTERVAL:-300}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "solarfs-ingest: pegando a $$INGEST_URL cada $${INGEST_INTERVAL}s";
        while true; do
          curl -fsS -m 60 -H "Authorization: Bearer $$CRON_SECRET" "$$INGEST_URL" \
            && echo " ✓ $$(date '+%H:%M:%S')" \
            || echo " ✗ ingesta falló $$(date '+%H:%M:%S')";
          sleep "$$INGEST_INTERVAL";
        done

  # Igual que `ingest` pero contra PRODUCCION (Vercel). Mientras esta Mac este prendida,
  # la data de prod se refresca cada 5 min (el cron diario de Vercel cierra el dia igual).
  # Plan Hobby de Vercel no permite crons de 5 min; GitHub Actions quedo bloqueado por
  # billing del usuario — este servicio es el puente gratis.
  ingest-prod:
    image: curlimages/curl:latest
    container_name: solarfs-ingest-prod
    restart: unless-stopped
    environment:
      CRON_SECRET: ${CRON_SECRET:-}
      INGEST_URL: ${INGEST_PROD_URL:-https://solar-fs.vercel.app/api/cron/ingest}
      INGEST_INTERVAL: ${INGEST_INTERVAL:-300}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "solarfs-ingest-prod: pegando a $$INGEST_URL cada $${INGEST_INTERVAL}s";
        while true; do
          curl -fsS -m 120 -o /dev/null -H "Authorization: Bearer $$CRON_SECRET" "$$INGEST_URL" \
            && echo " ✓ $$(date '+%H:%M:%S')" \
            || echo " ✗ ingesta prod falló $$(date '+%H:%M:%S')";
          sleep "$$INGEST_INTERVAL";
        done

volumes:
  solarfs_pgdata:
