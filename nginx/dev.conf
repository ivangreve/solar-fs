# Reverse proxy: nginx -> dev server de Next (en el host, puerto 3009).
# El bloque Upgrade/Connection es necesario para el hot-reload (HMR via WebSocket).

upstream next_dev {
    # host.docker.internal = el host desde el contenedor (Docker Desktop mac/win).
    server host.docker.internal:3009;
}

server {
    listen 80;
    server_name _;

    location / {
        proxy_pass http://next_dev;
        proxy_http_version 1.1;
        # $http_host preserva el puerto (localhost:8080); $host lo borra. Next valida
        # que Host coincida con Origin en las Server Actions (proteccion anti-CSRF).
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket (HMR / Fast Refresh de Next)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }
}
